# SOLEM — Hyprland config preset
# Palette navy + oro, layout minimal, hotkey AI-friendly.

# ── Monitor ────────────────────────────────────────────────────
monitor=,preferred,auto,1

# ── Input ──────────────────────────────────────────────────────
input {
    kb_layout = it
    follow_mouse = 1
    sensitivity = 0
    touchpad {
        natural_scroll = yes
    }
}

# ── General appearance ─────────────────────────────────────────
general {
    gaps_in = 6
    gaps_out = 12
    border_size = 2
    col.active_border = rgb(c9a961) rgb(2c5f9d) 45deg
    col.inactive_border = rgb(1f2c47)
    layout = dwindle
    allow_tearing = false
}

decoration {
    rounding = 4
    blur {
        enabled = true
        size = 4
        passes = 2
    }
    shadow {
        enabled = true
        range = 14
        render_power = 3
        color = rgba(0,0,0,0.6)
    }
    active_opacity = 1.0
    inactive_opacity = 0.95
}

animations {
    enabled = yes
    bezier = mybez, 0.16, 1, 0.3, 1
    animation = windows, 1, 4, mybez
    animation = windowsOut, 1, 4, default, popin 80%
    animation = border, 1, 8, default
    animation = fade, 1, 4, default
    animation = workspaces, 1, 4, mybez
}

dwindle {
    pseudotile = yes
    preserve_split = yes
}

misc {
    disable_hyprland_logo = true
    disable_splash_rendering = true
    background_color = 0x060a14
}

# ── Wallpaper via swaybg ───────────────────────────────────────
exec-once = swaybg -i /etc/xdg/solem/wallpaper.png -m fill
exec-once = waybar
exec-once = mako
exec-once = wl-paste --type text  --watch cliphist store
exec-once = wl-paste --type image --watch cliphist store

# ── Variables ──────────────────────────────────────────────────
$mainMod = SUPER
$term    = alacritty
$browser = firefox
$files   = nautilus
$menu    = wofi --show drun
$solem   = solem-shell

# ── Bindings ───────────────────────────────────────────────────
# Apps
bind = $mainMod, Return, exec, $term
bind = $mainMod, B,      exec, $browser
bind = $mainMod, E,      exec, $files
bind = $mainMod, R,      exec, $menu
bind = $mainMod, S,      exec, $solem
bind = $mainMod, D,      exec, $term -e solem-doctor

# Window mgmt
bind = $mainMod, Q,      killactive,
bind = $mainMod SHIFT, Q, exit,
bind = $mainMod, F,      togglefloating,
bind = $mainMod, M,      fullscreen,
bind = $mainMod, J,      togglesplit,

# Focus
bind = $mainMod, left,   movefocus, l
bind = $mainMod, right,  movefocus, r
bind = $mainMod, up,     movefocus, u
bind = $mainMod, down,   movefocus, d

# Workspaces
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5

# Screenshot
bind = , Print, exec, grim -g "$(slurp)" - | wl-copy
bind = SHIFT, Print, exec, grim - | wl-copy

# Mouse
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# Volume + brightness
bind = , XF86AudioRaiseVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%+
bind = , XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bind = , XF86AudioMute,        exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bind = , XF86MonBrightnessUp,   exec, brightnessctl set +10%
bind = , XF86MonBrightnessDown, exec, brightnessctl set 10%-
