<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" width="1920" height="1080">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="80%">
      <stop offset="0%"  style="stop-color:#0c1426;stop-opacity:1" />
      <stop offset="60%" style="stop-color:#060a14;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#020408;stop-opacity:1" />
    </radialGradient>
    <radialGradient id="orb" cx="50%" cy="50%" r="50%">
      <stop offset="0%"  style="stop-color:#c9a961;stop-opacity:0.85" />
      <stop offset="40%" style="stop-color:#1e3a5f;stop-opacity:0.4" />
      <stop offset="100%" style="stop-color:#060a14;stop-opacity:0" />
    </radialGradient>
    <linearGradient id="bar" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"  style="stop-color:#2c5f9d;stop-opacity:0" />
      <stop offset="50%" style="stop-color:#c9a961;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#2c5f9d;stop-opacity:0" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1920" height="1080" fill="url(#bg)"/>

  <!-- Sun orb centrale -->
  <circle cx="960" cy="540" r="380" fill="url(#orb)"/>
  <circle cx="960" cy="540" r="80" fill="#c9a961" opacity="0.9"/>
  <circle cx="960" cy="540" r="80" fill="none" stroke="#e8edf5" stroke-width="0.5" opacity="0.4"/>

  <!-- Wordmark serif al centro sotto orb -->
  <text x="960" y="780"
        text-anchor="middle"
        font-family="Cormorant Garamond, Georgia, serif"
        font-size="92"
        font-weight="500"
        letter-spacing="22"
        fill="#e8edf5">SOLEM</text>

  <!-- Gold bar sotto -->
  <rect x="660" y="820" width="600" height="2" fill="url(#bar)"/>

  <!-- Tagline -->
  <text x="960" y="855"
        text-anchor="middle"
        font-family="Inter, sans-serif"
        font-size="11"
        letter-spacing="8"
        fill="#8a96ad">AI-NATIVE OS</text>

  <!-- Decorative dots (constellation pattern) -->
  <g fill="#c9a961" opacity="0.4">
    <circle cx="200" cy="180" r="1.5"/>
    <circle cx="350" cy="120" r="1"/>
    <circle cx="500" cy="220" r="1.5"/>
    <circle cx="650" cy="160" r="1"/>
    <circle cx="1300" cy="180" r="1"/>
    <circle cx="1450" cy="240" r="1.5"/>
    <circle cx="1600" cy="140" r="1"/>
    <circle cx="1750" cy="200" r="1.5"/>
    <circle cx="240" cy="900" r="1"/>
    <circle cx="400" cy="960" r="1.5"/>
    <circle cx="560" cy="920" r="1"/>
    <circle cx="1380" cy="940" r="1.5"/>
    <circle cx="1540" cy="900" r="1"/>
    <circle cx="1700" cy="960" r="1"/>
  </g>
</svg>
