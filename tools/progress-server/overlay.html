<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<title>SOLEM Overlay</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; background: rgba(10,22,40,0.92); color: #e8edf5; font-family: 'Inter', sans-serif; overflow: hidden; backdrop-filter: blur(20px); }
.wrap { padding: 28px; display: flex; flex-direction: column; height: 100%; gap: 14px; }
.head { display: flex; align-items: baseline; gap: 16px; }
.logo { font-family: 'Cormorant Garamond', serif; font-size: 36px; color: #c9a961; letter-spacing: 0.2em; }
.tag { font-size: 10px; letter-spacing: 0.3em; color: #8a96ad; }
.cluster-bar { margin-left: auto; font-size: 11px; color: #8a96ad; font-family: 'JetBrains Mono', monospace; }
.cluster-bar b { color: #c9a961; }
.input {
  width: 100%; padding: 18px 22px;
  background: #1a2f54; border: 2px solid #c9a961; border-radius: 8px;
  color: #e8edf5; font-size: 18px; font-family: 'Cormorant Garamond', serif;
  outline: none; transition: all 0.2s;
}
.input::placeholder { color: #5a6680; }
.input:focus { box-shadow: 0 0 24px rgba(201,169,97,0.3); }
.suggestions { display: flex; flex-wrap: wrap; gap: 8px; }
.sugg {
  font-size: 11px; padding: 6px 12px;
  background: rgba(201,169,97,0.1); border: 1px solid #2c4a7a;
  border-radius: 16px; cursor: pointer; color: #c9a961;
  transition: all 0.15s;
}
.sugg:hover { border-color: #c9a961; background: rgba(201,169,97,0.2); }
.reply {
  flex: 1; overflow-y: auto; padding: 14px;
  background: rgba(5,9,18,0.6); border-radius: 6px;
  border-left: 3px solid #c9a961;
  font-size: 14px; line-height: 1.6;
  min-height: 80px;
}
.reply.empty { color: #5a6680; font-style: italic; font-size: 12px; }
.reply b { color: #c9a961; font-family: 'Cormorant Garamond', serif; font-size: 16px; display: block; margin-bottom: 6px; }
.hint { font-size: 10px; color: #5a6680; text-align: center; letter-spacing: 0.1em; }
.hint kbd { background: #c9a961; color: #050912; padding: 1px 6px; border-radius: 3px; font-family: 'JetBrains Mono', monospace; font-size: 10px; }
</style>
</head>
<body>
<div class="wrap">
  <div class="head">
    <div class="logo">GAVIO</div>
    <div class="tag">OVERLAY · SUPER+SPACE</div>
    <div class="cluster-bar" id="cluster">cluster: <b id="cluster-count">…</b> device · <b id="cluster-load">…</b> load</div>
  </div>
  <input class="input" id="q" placeholder='Chiedi a GAVIO… ("blocca social 25 min", "trova foto", "stato cluster")' autofocus>
  <div class="suggestions">
    <div class="sugg" onclick="ask('mostra stato cluster')">stato cluster</div>
    <div class="sugg" onclick="ask('riassumi ultima email')">riassumi email</div>
    <div class="sugg" onclick="ask('blocca social per 25 minuti')">focus 25 min</div>
    <div class="sugg" onclick="ask('quale device ha la GPU libera?')">GPU libera?</div>
    <div class="sugg" onclick="ask('apri logseq')">apri logseq</div>
    <div class="sugg" onclick="ask('fai backup ora')">backup</div>
  </div>
  <div class="reply empty" id="reply">In attesa di un comando… (premi Invio per inviare a GAVIO)</div>
  <div class="hint">
    <kbd>Invio</kbd> invia · <kbd>Esc</kbd> chiudi · <kbd>↑↓</kbd> cronologia
  </div>
</div>

<script>
const API = "http://127.0.0.1:8001";
const q = document.getElementById('q');
const reply = document.getElementById('reply');
const history = JSON.parse(localStorage.getItem('solem-overlay-history') || '[]');
let hIdx = history.length;

q.addEventListener('keydown', e => {
  if (e.key === 'Enter') { ask(q.value); }
  if (e.key === 'Escape') { window.close(); }
  if (e.key === 'ArrowUp' && hIdx > 0) { hIdx--; q.value = history[hIdx] || ''; }
  if (e.key === 'ArrowDown' && hIdx < history.length) { hIdx++; q.value = history[hIdx] || ''; }
});

async function ask(text) {
  text = (text || q.value || '').trim();
  if (!text) return;
  q.value = '';
  history.push(text); hIdx = history.length;
  localStorage.setItem('solem-overlay-history', JSON.stringify(history.slice(-50)));

  reply.classList.remove('empty');
  reply.innerHTML = '<b>GAVIO</b>Sto pensando...';

  try {
    const r = await fetch(`${API}/solem/ai/route`, {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({
        messages: [{role: 'user', content: text}],
        hint: 'auto', max_tokens: 600, temperature: 0.4
      }),
    });
    if (r.ok) {
      const data = await r.json();
      reply.innerHTML = '<b>GAVIO</b>' + (data.content || '(risposta vuota)');
    } else {
      reply.innerHTML = `<b>GAVIO offline</b>SOLEM API ${API} non risponde. Code: ${r.status}.<br><span style="font-size:11px;color:#8a96ad">Avvia: systemctl start gavio solem-api</span>`;
    }
  } catch (e) {
    reply.innerHTML = `<b>SOLEM API non raggiungibile</b><span style="font-size:11px;color:#8a96ad">${e.message}<br>L'overlay funziona quando solem-api gira su :8001</span>`;
  }
}

async function refreshCluster() {
  try {
    const r = await fetch(`${API}/solem/cluster/topology`);
    if (r.ok) {
      const t = await r.json();
      document.getElementById('cluster-count').textContent = t.online_devices;
      document.getElementById('cluster-load').textContent = (t.devices || []).reduce((s,d) => s+(d.load_pct||0), 0) / Math.max(1, t.online_devices) + '%';
    } else {
      document.getElementById('cluster-count').textContent = '?';
      document.getElementById('cluster-load').textContent = '?';
    }
  } catch (e) {
    document.getElementById('cluster-count').textContent = '0';
    document.getElementById('cluster-load').textContent = '—';
  }
}
refreshCluster();
setInterval(refreshCluster, 15000);
</script>
</body>
</html>
