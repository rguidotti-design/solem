name: SOLEM CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]
  workflow_dispatch:

# Permessi: serve write su issues per pubblicare log fail come comment
# (visibili pubblicamente, niente auth richiesta per lettura).
permissions:
  contents: read
  issues: write
  checks: write
  actions: read

# Cancella build precedenti se viene pushato nuovo commit sullo stesso branch
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─────────────────────────────────────────────────────────────────
  # 1. Lint Nix (statix + deadnix + nixpkgs-fmt)
  # ─────────────────────────────────────────────────────────────────
  nix-lint:
    name: Lint Nix
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: cachix/install-nix-action@v27
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes

      - name: nixpkgs-fmt check
        run: nix run nixpkgs#nixpkgs-fmt -- --check . || echo "::warning ::nixpkgs-fmt suggests formatting changes"

      - name: statix check
        run: nix run nixpkgs#statix -- check . || echo "::warning ::statix found suggestions"

      - name: deadnix check
        run: nix run nixpkgs#deadnix -- . || echo "::warning ::deadnix found unused code"

  # ─────────────────────────────────────────────────────────────────
  # 2. Nix flake check (esegue tutti i VM tests sotto nixos/tests)
  # ─────────────────────────────────────────────────────────────────
  flake-check:
    name: Flake check + VM tests
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - name: Setup KVM (necessario per VM tests)
        run: |
          sudo apt-get update
          sudo apt-get install -y qemu-system-x86 ovmf
          sudo usermod -aG kvm $USER

      - uses: cachix/install-nix-action@v27
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes
            substituters = https://cache.nixos.org/ https://solem.cachix.org
            trusted-public-keys = cache.nixos.org-1:6NCHdD59X431o0gWypbMrAURkbJ16ZPMQFGspcDShjY= solem.cachix.org-1:/Qb3qrQen+Zz+DRFO1/RMMvDJ73LzUpTvkzAuEINREU= nix-community.cachix.org-1:mB9FSh9qf2dCimDSUo8Zy7bkq5CX+/rkCWyvRCYg3Fs=

      - name: Setup Cachix cache (free tier 10 GB)
        uses: cachix/cachix-action@v15
        continue-on-error: true       # non bloccare la CI se Cachix non è configurato
        with:
          name: solem
          authToken: '${{ secrets.CACHIX_AUTH_TOKEN }}'
          skipPush: ${{ secrets.CACHIX_AUTH_TOKEN == '' }}

      - name: Aggiorna flake.lock
        run: nix flake update || true

      - name: nix flake check (eval + VM tests)
        run: nix flake check --no-build --show-trace
        # `--no-build` = solo eval check; il vero build dei test è jobs separato

  # ─────────────────────────────────────────────────────────────────
  # 3. Build dei profili (matrix x86_64-linux)
  # ─────────────────────────────────────────────────────────────────
  build-profiles:
    name: Build ${{ matrix.profile }}
    runs-on: ubuntu-latest
    timeout-minutes: 90
    strategy:
      fail-fast: false
      matrix:
        profile:
          - vm
          - iso
          # - raspberry  # aarch64-linux, richiede emulazione QEMU (lento)
          # - jetson     # aarch64-linux idem
    steps:
      - uses: actions/checkout@v4
      - uses: cachix/install-nix-action@v27
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes
            substituters = https://cache.nixos.org/ https://solem.cachix.org
            trusted-public-keys = cache.nixos.org-1:6NCHdD59X431o0gWypbMrAURkbJ16ZPMQFGspcDShjY= solem.cachix.org-1:/Qb3qrQen+Zz+DRFO1/RMMvDJ73LzUpTvkzAuEINREU= nix-community.cachix.org-1:mB9FSh9qf2dCimDSUo8Zy7bkq5CX+/rkCWyvRCYg3Fs=

      - uses: cachix/cachix-action@v15
        continue-on-error: true
        with:
          name: solem
          authToken: '${{ secrets.CACHIX_AUTH_TOKEN }}'
          skipPush: ${{ secrets.CACHIX_AUTH_TOKEN == '' }}

      - name: Aggiorna flake.lock
        run: nix flake update || true

      - name: nix build .#${{ matrix.profile }}
        run: nix build .#${{ matrix.profile }} --no-link --show-trace --keep-going

  # ─────────────────────────────────────────────────────────────────
  # 4. VM tests reali (lenti, separati dal flake check eval)
  # ─────────────────────────────────────────────────────────────────
  vm-tests:
    name: VM test ${{ matrix.test }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        test:
          - basic-boot
          - solem-cli
          - firewall-base
          - solem-demo
          - ai-guardrails
          - ai-user-isolation
          - ai-network-egress
          - gavio-zero-trust
          - canary-trip
          - red-team-ai
          - kernel-harden
          - ai-dns-allowlist
          - apparmor
          - ai-audit-strict
          - hardened-kernel
          # Disabilitato temp: gavio-stub (richiede build package gavio)
    steps:
      - uses: actions/checkout@v4

      - name: Setup KVM acceleration
        run: |
          sudo apt-get update
          sudo apt-get install -y qemu-system-x86 ovmf
          sudo modprobe kvm
          sudo chmod 666 /dev/kvm

      - uses: cachix/install-nix-action@v27
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes
            substituters = https://cache.nixos.org/ https://solem.cachix.org
            trusted-public-keys = cache.nixos.org-1:6NCHdD59X431o0gWypbMrAURkbJ16ZPMQFGspcDShjY= solem.cachix.org-1:/Qb3qrQen+Zz+DRFO1/RMMvDJ73LzUpTvkzAuEINREU= nix-community.cachix.org-1:mB9FSh9qf2dCimDSUo8Zy7bkq5CX+/rkCWyvRCYg3Fs=

      - uses: cachix/cachix-action@v15
        continue-on-error: true
        with:
          name: solem
          authToken: '${{ secrets.CACHIX_AUTH_TOKEN }}'
          skipPush: ${{ secrets.CACHIX_AUTH_TOKEN == '' }}

      - name: Aggiorna flake.lock
        run: nix flake update || true

      - name: Run VM test ${{ matrix.test }}
        run: |
          set -o pipefail
          nix build .#checks.x86_64-linux.${{ matrix.test }} \
            --show-trace --print-build-logs 2>&1 | tee /tmp/vmtest-${{ matrix.test }}.log

      - name: Dump VM test log on failure
        if: failure()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set +e
          # Estrai tail 200 del log
          LOG_TAIL=$(tail -200 /tmp/vmtest-${{ matrix.test }}.log 2>/dev/null)
          if [ -z "$LOG_TAIL" ]; then LOG_TAIL="(no log file)"; fi

          # 1. Markdown summary (visibile UI GitHub, non via API)
          {
            echo "## VM test ${{ matrix.test }} — FAIL log (tail 200)"
            echo '```'
            echo "$LOG_TAIL"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

          # 2. Stdout (visibile in job log)
          echo "===== TAIL 200 LOG ====="
          echo "$LOG_TAIL"
          echo "===== END LOG ====="

          # 3. Commit del log a branch dedicato ci-logs (visibile via raw URL).
          # Approccio piu' affidabile di gh issue comment (permessi/CLI).
          TEST_NAME="${{ matrix.test }}"
          SHA_SHORT="${GITHUB_SHA:0:7}"
          TIMESTAMP=$(date -u +%Y%m%dT%H%M%SZ)
          LOG_FILE="logs/${SHA_SHORT}/${TIMESTAMP}-${TEST_NAME}.log"

          # Setup git identity
          git config --global user.email "ci-bot@solem.local"
          git config --global user.name "SOLEM CI bot"
          git config --global --add safe.directory "$GITHUB_WORKSPACE"

          # Clone branch ci-logs in dir separata (orphan se non esiste)
          cd /tmp
          rm -rf solem-ci-logs
          if git ls-remote --exit-code --heads "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" ci-logs >/dev/null 2>&1; then
            git clone --branch ci-logs --single-branch "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" solem-ci-logs
          else
            mkdir -p solem-ci-logs
            cd solem-ci-logs
            git init -b ci-logs
            git remote add origin "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
            cd ..
          fi

          cd solem-ci-logs
          mkdir -p "logs/${SHA_SHORT}"
          echo "# VM test ${TEST_NAME} FAIL — commit ${SHA_SHORT} @ ${TIMESTAMP}" > "${LOG_FILE}"
          echo "" >> "${LOG_FILE}"
          echo "${LOG_TAIL}" >> "${LOG_FILE}"

          git add "${LOG_FILE}"
          git commit -m "log: ${TEST_NAME} fail @ ${SHA_SHORT}" || true
          git push origin ci-logs 2>&1 | tail -5
          echo "Log committed to ci-logs branch: ${LOG_FILE}"
          set -e

      - name: Upload VM test log artifact
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: vmtest-log-${{ matrix.test }}
          path: /tmp/vmtest-${{ matrix.test }}.log
          retention-days: 7
          if-no-files-found: ignore

  # ─────────────────────────────────────────────────────────────────
  # 5. Backend pytest (GAVIO Python)
  # ─────────────────────────────────────────────────────────────────
  python-tests:
    name: Backend pytest
    runs-on: ubuntu-latest
    if: false  # GAVIO backend non incluso in questo repo (è submodule esterno)
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install backend deps
        working-directory: backend
        run: |
          pip install --upgrade pip
          pip install -r solem_api/requirements.txt
          pip install pytest httpx
      - name: Run pytest
        working-directory: backend
        run: pytest -v

  # ─────────────────────────────────────────────────────────────────
  # 6. Riepilogo (status check unico)
  # ─────────────────────────────────────────────────────────────────
  ci-summary:
    name: CI summary
    runs-on: ubuntu-latest
    needs: [nix-lint, flake-check, build-profiles, vm-tests]
    if: always()
    steps:
      - name: Summary
        run: |
          echo "## SOLEM CI Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- Lint: ${{ needs.nix-lint.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- Flake check: ${{ needs.flake-check.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- Build profiles: ${{ needs.build-profiles.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- VM tests: ${{ needs.vm-tests.result }}" >> $GITHUB_STEP_SUMMARY
