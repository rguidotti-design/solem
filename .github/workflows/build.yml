name: SOLEM CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]
  workflow_dispatch:

# Permessi: serve write su issues per pubblicare log fail come comment
# (visibili pubblicamente, niente auth richiesta per lettura).
permissions:
  contents: read
  issues: write
  checks: write
  actions: read

# Cancella build precedenti se viene pushato nuovo commit sullo stesso branch
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─────────────────────────────────────────────────────────────────
  # 1. Lint Nix (statix + deadnix + nixpkgs-fmt)
  # ─────────────────────────────────────────────────────────────────
  nix-lint:
    name: Lint Nix
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: cachix/install-nix-action@v27
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes

      - name: nixpkgs-fmt check
        run: nix run nixpkgs#nixpkgs-fmt -- --check . || echo "::warning ::nixpkgs-fmt suggests formatting changes"

      - name: statix check
        run: nix run nixpkgs#statix -- check . || echo "::warning ::statix found suggestions"

      - name: deadnix check
        run: nix run nixpkgs#deadnix -- . || echo "::warning ::deadnix found unused code"

  # ─────────────────────────────────────────────────────────────────
  # 2. Nix flake check (esegue tutti i VM tests sotto nixos/tests)
  # ─────────────────────────────────────────────────────────────────
  flake-check:
    name: Flake check + VM tests
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - name: Setup KVM (necessario per VM tests)
        run: |
          sudo apt-get update
          sudo apt-get install -y qemu-system-x86 ovmf
          sudo usermod -aG kvm $USER

      - uses: cachix/install-nix-action@v27
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes
            substituters = https://cache.nixos.org/ https://solem.cachix.org
            trusted-public-keys = cache.nixos.org-1:6NCHdD59X431o0gWypbMrAURkbJ16ZPMQFGspcDShjY= solem.cachix.org-1:/Qb3qrQen+Zz+DRFO1/RMMvDJ73LzUpTvkzAuEINREU= nix-community.cachix.org-1:mB9FSh9qf2dCimDSUo8Zy7bkq5CX+/rkCWyvRCYg3Fs=

      - name: Setup Cachix cache (free tier 10 GB)
        uses: cachix/cachix-action@v15
        continue-on-error: true       # non bloccare la CI se Cachix non è configurato
        with:
          name: solem
          authToken: '${{ secrets.CACHIX_AUTH_TOKEN }}'
          skipPush: ${{ secrets.CACHIX_AUTH_TOKEN == '' }}

      - name: Aggiorna flake.lock
        run: nix flake update || true

      - name: nix flake check (eval + VM tests)
        run: nix flake check --no-build --show-trace
        # `--no-build` = solo eval check; il vero build dei test è jobs separato

  # ─────────────────────────────────────────────────────────────────
  # 3. Build dei profili (matrix x86_64-linux)
  # ─────────────────────────────────────────────────────────────────
  build-profiles:
    name: Build ${{ matrix.profile }}
    runs-on: ubuntu-latest
    timeout-minutes: 90
    strategy:
      fail-fast: false
      matrix:
        profile:
          - vm
          - iso
          # - raspberry  # aarch64-linux, richiede emulazione QEMU (lento)
          # - jetson     # aarch64-linux idem
    steps:
      - uses: actions/checkout@v4
      - uses: cachix/install-nix-action@v27
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes
            substituters = https://cache.nixos.org/ https://solem.cachix.org
            trusted-public-keys = cache.nixos.org-1:6NCHdD59X431o0gWypbMrAURkbJ16ZPMQFGspcDShjY= solem.cachix.org-1:/Qb3qrQen+Zz+DRFO1/RMMvDJ73LzUpTvkzAuEINREU= nix-community.cachix.org-1:mB9FSh9qf2dCimDSUo8Zy7bkq5CX+/rkCWyvRCYg3Fs=

      - uses: cachix/cachix-action@v15
        continue-on-error: true
        with:
          name: solem
          authToken: '${{ secrets.CACHIX_AUTH_TOKEN }}'
          skipPush: ${{ secrets.CACHIX_AUTH_TOKEN == '' }}

      - name: Aggiorna flake.lock
        run: nix flake update || true

      - name: nix build .#${{ matrix.profile }}
        run: nix build .#${{ matrix.profile }} --no-link --show-trace --keep-going

  # ─────────────────────────────────────────────────────────────────
  # 4. VM tests reali (lenti, separati dal flake check eval)
  # ─────────────────────────────────────────────────────────────────
  vm-tests:
    name: VM test ${{ matrix.test }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        test:
          - basic-boot
          - solem-cli
          - firewall-base
          - solem-demo
          - ai-guardrails
          - ai-user-isolation
          - ai-network-egress
          - gavio-zero-trust
          - canary-trip
          - red-team-ai
          - kernel-harden
          - ai-dns-allowlist
          - apparmor
          - ai-audit-strict
          - hardened-kernel
          # Disabilitato temp: gavio-stub (richiede build package gavio)
    steps:
      - uses: actions/checkout@v4

      - name: Setup KVM acceleration
        run: |
          sudo apt-get update
          sudo apt-get install -y qemu-system-x86 ovmf
          sudo modprobe kvm
          sudo chmod 666 /dev/kvm

      - uses: cachix/install-nix-action@v27
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes
            substituters = https://cache.nixos.org/ https://solem.cachix.org
            trusted-public-keys = cache.nixos.org-1:6NCHdD59X431o0gWypbMrAURkbJ16ZPMQFGspcDShjY= solem.cachix.org-1:/Qb3qrQen+Zz+DRFO1/RMMvDJ73LzUpTvkzAuEINREU= nix-community.cachix.org-1:mB9FSh9qf2dCimDSUo8Zy7bkq5CX+/rkCWyvRCYg3Fs=

      - uses: cachix/cachix-action@v15
        continue-on-error: true
        with:
          name: solem
          authToken: '${{ secrets.CACHIX_AUTH_TOKEN }}'
          skipPush: ${{ secrets.CACHIX_AUTH_TOKEN == '' }}

      - name: Aggiorna flake.lock
        run: nix flake update || true

      - name: Run VM test ${{ matrix.test }}
        run: |
          set -o pipefail
          nix build .#checks.x86_64-linux.${{ matrix.test }} \
            --show-trace --print-build-logs 2>&1 | tee /tmp/vmtest-${{ matrix.test }}.log

      - name: Dump VM test log on failure
        if: failure()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # Estrai tail 200 del log
          LOG_TAIL=$(tail -200 /tmp/vmtest-${{ matrix.test }}.log 2>/dev/null || echo "(no log)")

          # 1. Markdown summary visibile UI GitHub
          {
            echo "## VM test ${{ matrix.test }} — FAIL log (tail 200)"
            echo '```'
            echo "$LOG_TAIL"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

          # 2. Stdout (visibile in job log con accesso admin)
          echo "===== TAIL 200 LOG ====="
          echo "$LOG_TAIL"

          # 3. Crea GitHub Issue comment (visibile pubblicamente senza auth)
          # Trova issue "CI fail logs" (creo se non esiste) e aggiungo comment.
          # NB: github.token ha permessi default (write su issues per workflow).
          set +e
          ISSUE_NUM=$(gh issue list --search "CI fail logs in:title" --json number --jq '.[0].number' 2>/dev/null)
          if [ -z "$ISSUE_NUM" ] || [ "$ISSUE_NUM" = "null" ]; then
            ISSUE_NUM=$(gh issue create --title "CI fail logs" --body "Auto-populated by workflow on VM test failure." --label "ci" 2>/dev/null | grep -oE '/issues/[0-9]+' | grep -oE '[0-9]+')
          fi
          if [ -n "$ISSUE_NUM" ]; then
            BODY=$(printf '### VM test %s FAIL (commit %s)\n\n```\n%s\n```\n' \
              "${{ matrix.test }}" "${GITHUB_SHA:0:7}" "$LOG_TAIL")
            gh issue comment "$ISSUE_NUM" --body "$BODY" 2>&1 | head -3
          fi
          set -e

      - name: Upload VM test log artifact
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: vmtest-log-${{ matrix.test }}
          path: /tmp/vmtest-${{ matrix.test }}.log
          retention-days: 7
          if-no-files-found: ignore

  # ─────────────────────────────────────────────────────────────────
  # 5. Backend pytest (GAVIO Python)
  # ─────────────────────────────────────────────────────────────────
  python-tests:
    name: Backend pytest
    runs-on: ubuntu-latest
    if: false  # GAVIO backend non incluso in questo repo (è submodule esterno)
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install backend deps
        working-directory: backend
        run: |
          pip install --upgrade pip
          pip install -r solem_api/requirements.txt
          pip install pytest httpx
      - name: Run pytest
        working-directory: backend
        run: pytest -v

  # ─────────────────────────────────────────────────────────────────
  # 6. Riepilogo (status check unico)
  # ─────────────────────────────────────────────────────────────────
  ci-summary:
    name: CI summary
    runs-on: ubuntu-latest
    needs: [nix-lint, flake-check, build-profiles, vm-tests]
    if: always()
    steps:
      - name: Summary
        run: |
          echo "## SOLEM CI Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- Lint: ${{ needs.nix-lint.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- Flake check: ${{ needs.flake-check.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- Build profiles: ${{ needs.build-profiles.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- VM tests: ${{ needs.vm-tests.result }}" >> $GITHUB_STEP_SUMMARY
