name: Release SOLEM ISO

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-iso:
    name: Build qcow2 image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Nix
        uses: cachix/install-nix-action@v27
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes

      - name: Build VM qcow2
        run: nix build .#nixosConfigurations.solem-vm.config.system.build.vm

      - name: Calculate checksum
        run: |
          sha256sum result/nixos.qcow2 > result/nixos.qcow2.sha256

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: solem-vm-qcow2
          path: |
            result/nixos.qcow2
            result/nixos.qcow2.sha256

      - name: Create release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            result/nixos.qcow2
            result/nixos.qcow2.sha256
          generate_release_notes: true
