<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 80" width="320" height="80">
  <defs>
    <linearGradient id="navyGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"  style="stop-color:#2c5f9d;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#c9a961;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1e3a5f;stop-opacity:1" />
    </linearGradient>
    <radialGradient id="orb" cx="50%" cy="50%" r="50%">
      <stop offset="0%"  style="stop-color:#c9a961;stop-opacity:0.7" />
      <stop offset="60%" style="stop-color:#2c5f9d;stop-opacity:0.4" />
      <stop offset="100%" style="stop-color:#060a14;stop-opacity:0" />
    </radialGradient>
  </defs>

  <!-- Sun orb (metaphor: SOLEM = sun in Latin root) -->
  <circle cx="40" cy="40" r="28" fill="url(#orb)" />
  <circle cx="40" cy="40" r="14" fill="#c9a961" opacity="0.9" />
  <circle cx="40" cy="40" r="14" fill="none" stroke="#e8edf5" stroke-width="0.5" opacity="0.4" />

  <!-- Wordmark — Cormorant-style serif -->
  <text x="85" y="54"
        font-family="Cormorant Garamond, Georgia, serif"
        font-size="48"
        font-weight="500"
        letter-spacing="6"
        fill="#e8edf5">SOLEM</text>

  <!-- Underline gradient bar -->
  <rect x="85" y="63" width="155" height="1.5" fill="url(#navyGrad)" />

  <!-- Subtitle -->
  <text x="85" y="76"
        font-family="Inter, sans-serif"
        font-size="7"
        letter-spacing="3"
        fill="#8a96ad">AI-NATIVE OS</text>
</svg>
